name: Validate Detection PR

on:
  pull_request:
    branches: [main]
    paths:
      - "detections/**/*.yml"

jobs:
  validate:
    name: Validate Changed Detections
    # Runs on the self-hosted Ubuntu runner (Orbstack) — needs local Splunk access
    runs-on: [self-hosted, linux, dac]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip3 install --break-system-packages -r requirements.txt

      - name: Identify changed detection files
        id: changed
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'detections/**/*.yml' | tr '\n' ' ')
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ -z "$CHANGED" ]; then
            echo "No detection files changed."
          else
            echo "Changed detections: $CHANGED"
          fi

      - name: Validate schema and SPL syntax
        if: steps.changed.outputs.files != ''
        env:
          SPLUNK_URL: ${{ secrets.SPLUNK_URL }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
        run: |
          python3 scripts/validate.py \
            --github-annotations \
            ${{ steps.changed.outputs.files }}

      - name: No detection files changed
        if: steps.changed.outputs.files == ''
        run: echo "No detection YAML files were modified — nothing to validate."
