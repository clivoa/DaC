name: Validate Detection PR

on:
  pull_request:
    # Run only when a PR can affect detection validation or Splunk-ready content.
    branches: [dev, main]
    paths:
      - "detections/**/*.yml"
      - "schemas/**"
      - "scripts/validate.py"
      - "scripts/splunk_client.py"
      - "requirements.txt"
      - ".github/workflows/validate-pr.yml"

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Validate Changed Detections
    # Runs on the self-hosted Ubuntu runner — needs access to Splunk for live SPL checks.
    # See docs/runner-setup.md for setup instructions.
    runs-on: [self-hosted, linux, dac]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip3 install --break-system-packages -r requirements.txt

      - name: Identify changed detection files
        id: changed
        shell: bash
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          BASE="origin/${{ github.base_ref }}...HEAD"
          SUPPORT_CHANGED=$(git diff --name-only --diff-filter=ACMRT "$BASE" -- \
            'schemas/**' \
            'scripts/validate.py' \
            'scripts/splunk_client.py' \
            'requirements.txt' \
            '.github/workflows/validate-pr.yml' \
            | tr '\n' ' ' | sed 's/[[:space:]]*$//')

          if [ -n "$SUPPORT_CHANGED" ]; then
            CHANGED=$(find detections -type f -name '*.yml' | sort | tr '\n' ' ' | sed 's/[[:space:]]*$//')
            echo "Validation support changed: $SUPPORT_CHANGED"
            echo "Validating all detection files."
          else
            CHANGED=$(git diff --name-only --diff-filter=ACMRT "$BASE" -- 'detections/**/*.yml' | tr '\n' ' ' | sed 's/[[:space:]]*$//')
          fi

          DELETED=$(git diff --name-only --diff-filter=D "$BASE" -- 'detections/**/*.yml' | tr '\n' ' ' | sed 's/[[:space:]]*$//')
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "deleted=$DELETED" >> "$GITHUB_OUTPUT"
          if [ -n "$DELETED" ]; then echo "Deleted detections: $DELETED"; fi
          if [ -z "$CHANGED" ]; then echo "No detection files changed."; else echo "Changed detections: $CHANGED"; fi

      - name: Block deleted detection files
        if: steps.changed.outputs.deleted != ''
        run: |
          echo "::error::Detection files must not be deleted. Set status: deprecated instead, then handle Splunk removal through an explicit decommission process."
          echo "Deleted detections: ${{ steps.changed.outputs.deleted }}"
          exit 1

      - name: Validate schema and SPL syntax
        if: steps.changed.outputs.files != ''
        env:
          SPLUNK_URL: ${{ secrets.SPLUNK_URL }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
        run: |
          python3 scripts/validate.py \
            --github-annotations \
            ${{ steps.changed.outputs.files }}

      - name: No detection files changed
        if: steps.changed.outputs.files == ''
        run: echo "No detection YAML files were modified — nothing to validate."
