name: "Detect Suspicious CMD Execution"
id: "e6f7a8b9-c0d1-4e2f-b3c4-d5e6f7a8b9c0"
version: 1
status: testing
author: "simulation"
date: "2026-05-06"
modified: "2026-05-06"
description: "Detects cmd.exe processes spawned via Event ID 4688 (process creation), which may indicate command-line based execution techniques"
type: alert
search: |
  index=windows EventCode=4688
  | eval is_suspicious = if(match(NewProcessName, "(?i)cmd\.exe"), "yes", "no")
  | where is_suspicious="yes"
  | stats count by ComputerName, User, NewProcessName, CommandLine
  | where count > 0
schedule:
  cron: "*/15 * * * *"
  earliest: "-15m"
  latest: "now"
alert:
  condition: "search count > 0"
  severity: high
  suppress: false
tags:
  mitre_attack:
    - T1059.003
  platform:
    - Windows
  category: endpoint
splunk_app: "search"
