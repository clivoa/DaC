name: "Detect Internal Port Scan Activity"
id: "c3d4e5f6-a7b8-4c9d-ae1f-2a3b4c5d6e7f"
version: 1
status: testing
author: "security-team"
date: "2026-05-06"
modified: "2026-05-06"
description: "Detects potential port scanning by identifying hosts making connections to an unusually high number of distinct destination ports within a short window, which may indicate reconnaissance activity"
type: alert
search: |
  index=network
  | bin _time span=5m
  | stats dc(dest_port) as unique_ports count as total_connections
      by src_ip, dest_ip, _time
  | where unique_ports > 100
  | eval scan_intensity=case(
      unique_ports > 1000, "aggressive",
      unique_ports > 500, "high",
      unique_ports > 100, "moderate"
    )
  | sort -unique_ports
schedule:
  cron: "*/10 * * * *"
  earliest: "-10m"
  latest: "now"
alert:
  condition: "search count > 0"
  severity: medium
  suppress: true
  suppress_period: "1h"
tags:
  mitre_attack:
    - T1046
  platform:
    - Windows
    - Linux
    - Network
  category: network
splunk_app: "search"
