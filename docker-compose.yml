services:
  gh-runner:
    build:
      context: .
      dockerfile: runner/Dockerfile
      args:
        RUNNER_VERSION: "2.334.0"
    image: dac-gh-runner:latest
    container_name: dac-gh-runner
    restart: unless-stopped
    environment:
      # GitHub identity — required
      GITHUB_OWNER: ${GITHUB_OWNER}
      GITHUB_REPO: ${GITHUB_REPO}
      # Auth — use RUNNER_TOKEN (one-time, from GitHub UI) or GITHUB_PAT (persistent)
      GITHUB_PAT: ${GITHUB_PAT:-}
      RUNNER_TOKEN: ${RUNNER_TOKEN:-}
      # Runner identity — optional
      RUNNER_NAME: ${RUNNER_NAME:-dac-runner}
      RUNNER_LABELS: ${RUNNER_LABELS:-self-hosted,linux,dac}
      # Splunk connection — used by validate.py and deploy.py inside workflows
      SPLUNK_URL: ${SPLUNK_URL:-https://host.internal:8089}
      SPLUNK_TOKEN: ${SPLUNK_TOKEN:-}
      SPLUNK_USERNAME: ${SPLUNK_USERNAME:-}
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD:-}
      SPLUNK_APP: ${SPLUNK_APP:-search}
    extra_hosts:
      # Allows the runner container to reach the Orbstack host (where Splunk runs)
      - "host.internal:host-gateway"
    volumes:
      # Persists runner registration (.runner, .credentials) so RUNNER_TOKEN
      # is only needed on the very first start — subsequent restarts reuse it
      - runner_config:/home/runner/actions-runner
      - runner_work:/home/runner/actions-runner/_work

volumes:
  runner_config:
  runner_work:
